<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Equipos</title>
    <link th:href="@{/css/global.css}" rel="stylesheet" />
</head>
<body class="page">
    <div class="container">
        <a th:href="@{/}" class="back-link">← Panel Principal</a>
        
        <header class="section-header">
            <h1>🛡️ Todos los Equipos</h1>
            <a th:href="@{/admin/team/new}" class="btn btn--primary">+ Registrar Nuevo</a>
        </header>

        <div class="grid-players"> <div th:each="team : ${teams}" class="player-card" style="border-left-color: var(--color-pitch-light);">
                <div>
                    <span class="player-card__name" th:text="${team.name}">Nombre</span>
                    <div class="mt-xs">
                        <span th:each="t : ${team.tournaments}" 
                              class="text-muted" 
                              style="font-size: 0.8rem; margin-right: 5px;"
                              th:text="'[' + ${t.name} + ']'"></span>
                        <span th:if="${#lists.isEmpty(team.tournaments)}" class="text-muted" style="font-size: 0.8rem;">(Sin torneo asignado)</span>
                    </div>
                </div>
                
                <div class="action-group" style="margin-top: 0;">
                    <a th:href="@{/admin/team/edit/{id}(id=${team.id})}" class="btn btn--outline" style="padding: 4px 10px; font-size: 0.8rem;">⚙️ Gestionar</a>
                    <button type="button" class="btn btn--danger" 
                        th:onclick="'confirmDeleteTeam(' + ${team.id} + ')'"
                        style="padding: 5px 10px; font-size: 0.8rem;">🗑️ Borrar</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function confirmDeleteTeam(id) {
    Swal.fire({
        title: '¿Borrar equipo?',
        text: "Se eliminará de todos los torneos donde participe.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#e63946',
        confirmButtonText: 'Sí, borrar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/admin/team/delete/" + id;
        }
    })
}
</script>
</html>
