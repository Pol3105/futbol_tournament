<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — SIW Football</title>
    <link th:href="@{/css/variables.css}" rel="stylesheet"/>
    <link th:href="@{/css/global.css}" rel="stylesheet"/>
    <link th:href="@{/css/auth.css}" rel="stylesheet"/>
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-logo">
            <span class="auth-logo__icon">⚽</span>
            <span class="auth-logo__title">SIW Football</span>
            <p class="auth-logo__subtitle">Plataforma de gestión deportiva</p>
        </div>

        <h2>Acceso al Sistema</h2>

        <div th:if="${param.error}" class="auth-error">
            ⚠️ Usuario o contraseña incorrectos.
        </div>

        <form th:action="@{/login}" method="POST" class="form">
            <div class="form__group">
                <label class="form__label" for="username">Usuario</label>
                <input type="text" id="username" name="username" class="form__input"
                       placeholder="Tu nombre de usuario" required autofocus/>
            </div>

            <div class="form__group">
                <label class="form__label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form__input"
                       placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn btn--primary auth-submit">
                🔐 Entrar
            </button>
        </form>

        <div class="auth-footer">
            <p>¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
        </div>
        <a th:href="@{/}" class="auth-back">← Volver a la web pública</a>
    </div>

</body>
</html>
