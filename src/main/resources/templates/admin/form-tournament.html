<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Torneo</title>
    <link th:href="@{/css/global.css}" rel="stylesheet" />
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background-color: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/}" class="back-link">← Cancelar y Volver</a>

    <div class="header-section">
        <h1 th:text="${tournament.id == null} ? '🏆 Crear Nuevo Torneo' : '✏️ Editar Torneo'">Acción</h1>
    </div>

    <form th:action="${tournament.id == null} ? @{/admin/tournament/new} : @{/admin/tournament/edit/{id}(id=${tournament.id})}" 
      th:object="${tournament}" method="post">

        <input type="hidden" th:field="*{id}" />
        
        <div class="form-group">
            <label for="name">Nombre del Torneo:</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Ej: Mundial 2026" required />
        </div>

        <div class="form-group">
            <label for="startDate">Fecha de Inicio:</label>
            <input type="date" id="startDate" th:field="*{startDate}" required />
        </div>

        <button type="submit" class="btn-submit">Guardar Torneo</button>
    </form>
</div>

</body>
</html>
