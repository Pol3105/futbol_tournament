<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tournament.id == null} ? 'Nuevo Torneo' : 'Editar Torneo'">Torneo — SIW Football</title>
    <link th:href="@{/css/variables.css}" rel="stylesheet"/>
    <link th:href="@{/css/global.css}" rel="stylesheet"/>
    <link th:href="@{/css/navbar.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar__brand">
        <span class="navbar__brand-icon">⚽</span>
        <span class="navbar__brand-text">SIW Football</span>
    </a>
    <div class="navbar__right">
        <div class="navbar__user">
            <strong sec:authentication="name"></strong>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn--danger">Cerrar Sesión</button>
        </form>
    </div>
</nav>

<main class="main-content">
<div class="container">

    <a th:href="@{/}" class="back-link">← Cancelar y Volver</a>

    <div class="section-header">
        <h1 th:text="${tournament.id == null} ? '🏆 Crear Nuevo Torneo' : '✏️ Editar Torneo'">Torneo</h1>
    </div>

    <form th:action="${tournament.id == null} ? @{/admin/tournament/new} : @{/admin/tournament/edit/{id}(id=${tournament.id})}"
          th:object="${tournament}" method="post" class="form card">
        <input type="hidden" th:field="*{id}"/>

        <div class="form__group">
            <label class="form__label" for="name">Nombre del Torneo</label>
            <input type="text" id="name" th:field="*{name}" class="form__input"
                   placeholder="Ej: Champions League 2026" required/>
        </div>

        <div class="form__group">
            <label class="form__label" for="startDate">Fecha de Inicio</label>
            <input type="date" id="startDate" th:field="*{startDate}" class="form__input" required/>
        </div>

        <div class="form__group">
            <label class="form__label" for="description">Descripción</label>
            <textarea id="description" th:field="*{description}" class="form__input" rows="4"
                      placeholder="Describe brevemente el formato y las reglas del torneo..." required></textarea>
        </div>

        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
            💾 Guardar Torneo
        </button>
    </form>

</div>
</main>
</body>
</html>
