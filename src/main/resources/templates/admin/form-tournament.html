<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tournament.id == null} ? 'Nuevo Torneo' : 'Editar Torneo'">Torneo</title>
    <link th:href="@{/css/global.css}" rel="stylesheet" />
</head>
<body class="page">

<div class="container">

    <a th:href="@{/}" class="back-link">← Cancelar y Volver</a>

    <div class="section-header">
        <h1 th:text="${tournament.id == null} ? '🏆 Crear Nuevo Torneo' : '✏️ Editar Torneo'">
            Acción
        </h1>
    </div>

    <form th:action="${tournament.id == null}
                      ? @{/admin/tournament/new}
                      : @{/admin/tournament/edit/{id}(id=${tournament.id})}"
          th:object="${tournament}"
          method="post"
          class="form card" style="padding: var(--space-xl);">

        <input type="hidden" th:field="*{id}" />

        <div class="form__group">
            <label class="form__label" for="name">Nombre del Torneo</label>
            <input class="form__input"
                   type="text"
                   id="name"
                   th:field="*{name}"
                   placeholder="Ej: Champions League 2026"
                   required />
        </div>

        <div class="form__group">
            <label class="form__label" for="startDate">Fecha de Inicio</label>
            <input class="form__input"
                   type="date"
                   id="startDate"
                   th:field="*{startDate}"
                   required />
        </div>

        <div class="form__group">
            <label class="form__label" for="description">Descripción del Torneo</label>
            <textarea class="form__input"
                      id="description"
                      th:field="*{description}"
                      rows="4"
                      placeholder="Describe brevemente las reglas o el formato del torneo..."
                      required></textarea>
        </div>

        <div style="margin-top: var(--space-lg);">
            <button type="submit" class="btn btn--primary" style="width: 100%;">
                💾 Guardar Torneo
            </button>
        </div>

    </form>
</div>

</body>
</html>
