<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Inscripciones — SIW Football</title>
    <link th:href="@{/css/variables.css}" rel="stylesheet"/>
    <link th:href="@{/css/global.css}" rel="stylesheet"/>
    <link th:href="@{/css/navbar.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar__brand">
        <span class="navbar__brand-icon">⚽</span>
        <span class="navbar__brand-text">SIW Football</span>
    </a>
    <div class="navbar__right">
        <div class="navbar__user">
            <strong sec:authentication="name"></strong>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn--danger">Cerrar Sesión</button>
        </form>
    </div>
</nav>

<main class="main-content">
<div class="container">

    <a th:href="@{/tournament/{id}(id=${tournament.id})}" class="back-link">← Volver al Torneo</a>

    <div class="section-header">
        <div>
            <h1>⚽ Gestionar Equipos</h1>
            <p class="text-muted" style="margin-bottom: 0;">
                Torneo: <strong th:text="${tournament.name}">Nombre</strong>
                &nbsp;·&nbsp; Inscribe o retira equipos de esta competición.
            </p>
        </div>
    </div>

    <div class="grid-players">
        <div th:each="team : ${allTeams}" class="player-card"
             th:style="${#lists.contains(tournament.teams, team)} ? 'border-left-color: var(--color-pitch-light); background: #f0fff4;' : ''">
            <div class="player-info">
                <span class="player-card__name" th:text="${team.name}">Equipo</span>
                <p class="text-muted" style="margin-bottom: 0; font-size: 0.8rem;">
                    📍 <span th:text="${team.city}">Ciudad</span>
                    <span th:if="${#lists.contains(tournament.teams, team)}"
                          style="margin-left: 8px; color: var(--color-success); font-weight: 600;">
                        ✅ Inscrito
                    </span>
                </p>
            </div>

            <div th:if="${#lists.contains(tournament.teams, team)}">
                <button type="button" class="btn btn--danger btn--sm"
                        th:data-tid="${tournament.id}"
                        th:data-id="${team.id}"
                        th:data-name="${team.name}"
                        onclick="confirmRemoveTeam(this)">
                    Retirar
                </button>
            </div>

            <div th:unless="${#lists.contains(tournament.teams, team)}">
                <a th:href="@{/admin/tournament/{id}/add-team/{teamId}(id=${tournament.id}, teamId=${team.id})}"
                   class="btn btn--primary btn--sm">
                    + Inscribir
                </a>
            </div>
        </div>
    </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function confirmRemoveTeam(btn) {
    const tournamentId = btn.getAttribute('data-tid');
    const teamId = btn.getAttribute('data-id');
    const teamName = btn.getAttribute('data-name');
    Swal.fire({
        title: '¿Retirar al ' + teamName + '?',
        text: '¡Se eliminarán todos los partidos y resultados de este equipo en este torneo!',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#e63946', cancelButtonColor: '#2ecc71',
        confirmButtonText: 'Sí, retirar equipo', cancelButtonText: 'Mantener equipo'
    }).then(r => {
        if (r.isConfirmed) window.location.href = '/admin/tournament/' + tournamentId + '/remove-team/' + teamId;
    });
}
</script>
</body>
</html>
