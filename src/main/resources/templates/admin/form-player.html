<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${player.id == null} ? 'Nuevo Jugador' : 'Editar Jugador'">Jugador — SIW Football</title>
    <link th:href="@{/css/variables.css}" rel="stylesheet"/>
    <link th:href="@{/css/global.css}" rel="stylesheet"/>
    <link th:href="@{/css/navbar.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar__brand">
        <span class="navbar__brand-icon">⚽</span>
        <span class="navbar__brand-text">SIW Football</span>
    </a>
    <div class="navbar__right">
        <div class="navbar__user">
            <strong sec:authentication="name"></strong>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn--danger">Cerrar Sesión</button>
        </form>
    </div>
</nav>

<main class="main-content">
<div class="container">

    <a th:href="@{/players}" class="back-link">← Cancelar y Volver</a>

    <div class="section-header">
        <h1 th:text="${player.id == null} ? '👤 Registrar Jugador' : '✏️ Editar Jugador'">Jugador</h1>
    </div>

    <form th:action="@{/admin/player/save}" th:object="${player}" method="post" class="form card">
        <input type="hidden" th:field="*{id}"/>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl);">
            <div class="form__group">
                <label class="form__label">Nombre</label>
                <input type="text" th:field="*{name}" class="form__input" required/>
            </div>
            <div class="form__group">
                <label class="form__label">Apellido</label>
                <input type="text" th:field="*{surname}" class="form__input" required/>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl);">
            <div class="form__group">
                <label class="form__label">Fecha de Nacimiento</label>
                <input type="date" th:field="*{birthDate}" class="form__input" required/>
            </div>
            <div class="form__group">
                <label class="form__label">Altura (metros)</label>
                <input type="number" step="0.01" th:field="*{height}" class="form__input"
                       placeholder="Ej: 1.85" required/>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl);">
            <div class="form__group">
                <label class="form__label">Posición</label>
                <select th:field="*{position}" class="form__input" required>
                    <option value="Goalkeeper">Goalkeeper (Portero)</option>
                    <option value="Defender">Defender (Defensa)</option>
                    <option value="Midfielder">Midfielder (Medio)</option>
                    <option value="Forward">Forward (Delantero)</option>
                </select>
            </div>
            <div class="form__group">
                <label class="form__label">🛡️ Equipo</label>
                <select th:field="*{team}" class="form__input">
                    <option value="">Agente Libre (Sin equipo)</option>
                    <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
            <span th:text="${player.id == null} ? '💾 Guardar Jugador' : '🔄 Actualizar Ficha'">Guardar</span>
        </button>
    </form>

</div>
</main>
</body>
</html>
