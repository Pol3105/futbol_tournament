<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores — SIW Football</title>
    <link th:href="@{/css/variables.css}" rel="stylesheet"/>
    <link th:href="@{/css/global.css}" rel="stylesheet"/>
    <link th:href="@{/css/navbar.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar__brand">
        <span class="navbar__brand-icon">⚽</span>
        <span class="navbar__brand-text">SIW Football</span>
    </a>
    <div class="navbar__right">
        <div sec:authorize="isAuthenticated()" class="navbar__user">
            <strong sec:authentication="name"></strong>
        </div>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn--danger">Cerrar Sesión</button>
        </form>
        <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn--outline-light">🔐 Iniciar Sesión</a>
    </div>
</nav>

<main class="main-content">
<div class="container">

    <a th:href="@{/}" class="back-link">← Panel Principal</a>

    <div class="section-header">
        <h1>🏃 Jugadores Registrados</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/player/new}"
           class="btn btn--primary btn--sm" style="margin-left: auto;">➕ Registrar Jugador</a>
    </div>

    <div th:if="${#lists.isEmpty(players)}" class="empty-state">
        No hay jugadores registrados aún.
    </div>

    <div class="grid-players">
        <div th:each="player : ${players}" class="player-card">
            <div class="player-info">
                <span class="player-card__name" th:text="${player.name} + ' ' + ${player.surname}">Nombre</span>
                <p class="text-muted" style="margin-bottom: 2px; font-size: 0.8rem;">
                    📍 <span th:text="${player.position}">Posición</span>
                    &nbsp;·&nbsp;
                    🛡️ <span th:text="${player.team != null ? player.team.name : 'Agente Libre'}">Equipo</span>
                </p>
                <p class="text-muted" style="margin-bottom: 0; font-size: 0.78rem;">
                    📅 <span th:text="${player.birthDate != null ? #temporals.format(player.birthDate, 'dd/MM/yyyy') : '—'}">—</span>
                    &nbsp;·&nbsp;
                    📏 <span th:text="${player.height != null ? player.height + ' m' : '—'}">—</span>
                </p>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="action-group" style="margin-top: 0; margin-left: auto;">
                <a th:href="@{/admin/player/edit/{id}(id=${player.id})}" class="btn btn--warning btn--sm">✏️</a>
                <button type="button" class="btn btn--danger btn--sm"
                        th:data-id="${player.id}"
                        th:data-name="${player.name} + ' ' + ${player.surname}"
                        onclick="confirmDeletePlayer(this)">🗑️</button>
            </div>
        </div>
    </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function confirmDeletePlayer(btn) {
    const id = btn.getAttribute('data-id');
    const name = btn.getAttribute('data-name');
    Swal.fire({
        title: '¿Eliminar a ' + name + '?', text: 'Se borrará su ficha del sistema.',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#e63946', confirmButtonText: 'Sí, eliminar', cancelButtonText: 'Cancelar'
    }).then(r => { if (r.isConfirmed) window.location.href = '/admin/player/delete/' + id; });
}
</script>
</body>
</html>
