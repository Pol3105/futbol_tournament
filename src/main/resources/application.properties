spring.application.name=siw-football

# Conexión a PostgreSQL en Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/siw_football
spring.datasource.username=siw_user
spring.datasource.password=siw_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate (Generación automática de tablas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
