services:
  db:
    image: postgres:15-alpine
    container_name: siw_postgres_db
    environment:
      POSTGRES_DB: siw_football
      POSTGRES_USER: siw_user
      POSTGRES_PASSWORD: siw_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: